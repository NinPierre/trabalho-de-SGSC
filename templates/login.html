<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceu Piauiense</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:#00244d;
    min-height:100vh;
    overflow-x:hidden;
}

/* ================= LOGIN ================= */

#loginPage{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.top-bar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:35px;
    display:flex;
}

.blue{
    flex:3;
    background:#0f2d75;
}

.red{
    flex:1;
    background:#990019;
}

.logo-area{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
    color:white;
}

.logo-area img{
    display:block;
    margin:auto;
    width:120px;
    height:auto;
}

.logo-area h2{
    margin-top:10px;
}

.logo-area p{
    margin-top:5px;
}

.login-container{
    width:90%;
    max-width:400px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

label{
    display:block;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

.btn-login{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#8b0012;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.btn-login:hover{
    background:#6d000d;
}

.forgot{
    text-align:center;
    margin-top:15px;
}

.forgot a{
    text-decoration:none;
    color:#00144d;
}

/* ================= DASHBOARD ================= */

#rankingPage{
    display:none;
    width:100%;
    min-height:100vh;
    background:#f5f5f5;
}

.dashboard{
    display:flex;
    width:100%;
    min-height:100vh;
}

.sidebar{
    width:280px;
    min-height:100vh;
    background:#00144d;
    color:white;
}

.sidebar h2{
    text-align:center;
    padding:25px;
    border-bottom:1px solid rgba(255,255,255,.2);
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:18px 25px;
}

.menu a:hover,
.menu a.active{
    background:#8b0012;
}

.content{
    flex:1;
    padding:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.content h1{
    color:#00144d;
}

.subtitulo{
    margin-top:5px;
    color:#555;
}

/* ================= CARDS ================= */

.cards{
    width:100%;
    max-width:1100px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin:30px 0;
}

.card{
    flex:1 1 300px;
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:#8b0012;
    font-size:28px;
    font-weight:bold;
}

/* ================= TABELA ================= */

.table-box{
    width:100%;
    max-width:1100px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#00144d;
    color:white;
}

th, td{
    padding:16px;
    text-align:center;
}

tbody tr:nth-child(even){
    background:#f4f4f4;
}

.nota{
    color:#8b0012;
    font-weight:bold;
}

/* ================= RESPONSIVO ================= */

@media(max-width:768px){

    .dashboard{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        min-height:auto;
    }

    .cards{
        flex-direction:column;
    }

    .content{
        padding:15px;
    }

    .login-container{
        width:95%;
    }
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

    <div class="top-bar">
        <div class="blue"></div>
        <div class="red"></div>
    </div>

    <div class="logo-area">
        <img src="download.png" alt="Logo do Liceu">
        <h2>LICEU PIAUIENSE</h2>
        <p>Educação que transforma.</p>
    </div>

    <div class="login-container">

        <label>CPF</label>

        <div class="input-group">
            <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>

        <label>SENHA</label>

        <div class="input-group">
            <input type="password" id="senha" placeholder="Digite sua senha">
            <span class="eye" onclick="mostrarSenha()">👁</span>
        </div>

        <button class="btn-login" onclick="entrar()">
            Entrar
        </button>

        <div class="forgot">
            <a href="#">Esqueceu sua senha?</a>
        </div>

    </div>

</div>
